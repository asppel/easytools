<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EasyTools</title>
  <meta name="description" content="Платформа инструментов для AutoCAD.">
  <style>
    :root {
      --bg: #f4f7fa;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --border: #d8e1ea;
      --accent: #0f766e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.12), transparent 24%),
        linear-gradient(180deg, #f4f7fa 0%, #eef4f8 100%);
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .hero {
      width: min(920px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.06);
      padding: 32px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(15, 118, 110, 0.12);
    }

    h1 {
      margin: 18px 0 8px;
      font-size: clamp(36px, 7vw, 64px);
      line-height: 0.96;
      letter-spacing: -0.04em;
    }

    .sub {
      margin: 0;
      font-size: clamp(16px, 3vw, 22px);
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
    }

    .button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">
        <span class="dot"></span>
        <span>AutoCAD</span>
      </div>
      <h1>EasyTools</h1>
      <p class="sub">Платформа инструментов для AutoCAD</p>

      <div class="actions">
        <a class="button primary" href="./Releases/1.0.0/EasyTools.Setup.1.0.0.exe">Скачать EasyTools</a>
        <a class="button" href="https://github.com/asppel/easytools">Github</a>
      </div>
    </section>
  </main>
</body>
</html>
